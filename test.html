<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exact Interface Replication</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap');

  :root {
    --bg-black: #121212;
    --card-white: #e3e3e3;
    --char-gray: #777777;
    --cheek-color: rgba(140, 140, 140, 0.6);
    --feature-dark: #2b2b2b;
    --phone-purple: #9c84ba;
  }

  body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
  }

  /* Purple iPhone Frame */
  .phone-frame {
    width: 410px;
    height: 840px;
    background: var(--phone-purple);
    border-radius: 60px;
    padding: 10px;
    box-sizing: border-box;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .screen {
    width: 100%;
    height: 100%;
    background: var(--bg-black);
    border-radius: 50px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Dynamic Island */
  .notch {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 115px;
    height: 35px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
  }

  .header { padding: 65px 28px 0; }
  
  .back-btn {
    width: 42px;
    height: 42px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }

  h1 {
    color: white;
    font-size: 38px;
    line-height: 1.1;
    margin: 0;
    letter-spacing: -0.5px;
  }

  .tag-container {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    padding: 45px 28px;
  }

  .tag {
    padding: 16px 30px;
    border-radius: 26px;
    background: #2d2d2d;
    color: white;
    font-weight: 700;
    font-size: 13px;
    border: none;
  }

  /* Card and Character Construction */
  .bottom-card {
    flex-grow: 1;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Pointier Peak SVG */
  .peak-svg {
    width: 100%;
    height: 48px;
    display: block;
    margin-bottom: -1px;
  }

  .card-fill {
    background: var(--card-white);
    flex-grow: 1;
    position: relative;
    overflow: hidden;
  }

  .gray-character {
    position: absolute;
    bottom: -60px;
    left: 50%;
    transform: translateX(-50%);
    width: 580px;
    height: 480px;
    background: var(--char-gray);
    border-radius: 50% 50% 0 0;
  }

  /* Exact Cheek Positioning in corners */
  .cheek {
    position: absolute;
    width: 180px;
    height: 180px;
    background: var(--cheek-color);
    border-radius: 50%;
    bottom: 80px;
  }
  .cheek.l { left: 15px; }
  .cheek.r { right: 15px; }

  .features {
    position: absolute;
    top: 105px;
    left: 50%;
    transform: translateX(-50%);
    width: 130px;
    height: 120px;
    z-index: 5;
  }

  .eye {
    width: 26px;
    height: 26px;
    background: var(--feature-dark);
    border-radius: 50%;
    position: absolute;
  }
  .eye.l { left: 0; }
  .eye.r { right: 0; }

  /* Redrawn Exact Smile with the "Side Hooks" */
  .smile-path {
    position: absolute;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
  }

  .footer {
    position: absolute;
    bottom: 35px;
    width: 100%;
    display: flex;
    justify-content: center;
    z-index: 10;
  }

  .submit-btn {
    background: #1e1e1e;
    color: white;
    border: none;
    padding: 18px 60px;
    border-radius: 35px;
    font-size: 17px;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="screen">
    <div class="notch"></div>
    <div class="header">
      <div class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
      </div>
      <h1>How are you<br>feeling today?</h1>
    </div>

    <div class="tag-container">
      <button class="tag">Happy</button>
      <button class="tag">Sad</button>
    </div>

    <div class="bottom-card">
      <svg class="peak-svg" viewBox="0 0 400 48" preserveAspectRatio="none">
        <path d="M0,48 L150,48 C175,48 185,5 200,5 C215,5 225,48 250,48 L400,48 L400,48 L0,48 Z" fill="#e3e3e3"/>
      </svg>
      <div class="card-fill">
        <div class="gray-character">
            <div class="cheek l"></div>
            <div class="cheek r"></div>

            <div class="features">
                <div class="eye l"></div>
                <div class="eye r"></div>
                
                <!-- This SVG recreates the specific 'fish hook' smile seen in image_bd3e3d.png -->
                <svg class="smile-path" viewBox="0 0 100 40">
                  <path d="M15,15 C10,22 15,28 20,28 C40,38 60,38 80,28 C85,28 90,22 85,15" 
                        fill="none" 
                        stroke="#2b2b2b" 
                        stroke-width="5.5" 
                        stroke-linecap="round"/>
                </svg>
            </div>
        </div>

        <div class="footer">
          <button class="submit-btn">Submit</button>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
